syntax = "proto3";

package furbbs;

enum ContentRating {
    RATING_SAFE = 0;
    RATING_MATURE = 1;
    RATING_EXPLICIT = 2;
}

enum CommissionStatus {
    COMMISSION_OPEN = 0;
    COMMISSION_CLOSED = 1;
    COMMISSION_ONLY_FRIENDS = 2;
}

enum OrderStatus {
    ORDER_PENDING = 0;
    ORDER_ACCEPTED = 1;
    ORDER_IN_PROGRESS = 2;
    ORDER_FINISHED = 3;
    ORDER_CANCELLED = 4;
}

enum EventStatus {
    EVENT_PLANNING = 0;
    EVENT_CONFIRMED = 1;
    EVENT_ONGOING = 2;
    EVENT_ENDED = 3;
    EVENT_CANCELLED = 4;
}

message UserInfo {
    string id = 1;
    string name = 2;
    string avatar = 3;
    string email = 4;
    string display_name = 5;
    string bio = 6;
    int32 follower_count = 7;
    int32 following_count = 8;
    int64 created_at = 9;
    repeated Badge badges = 10;
    CommissionStatus commission_status = 11;
    ContentRating max_allowed_rating = 12;
}

message Fursona {
    int64 id = 1;
    string user_id = 2;
    UserInfo user = 3;
    string name = 4;
    string species = 5;
    string gender = 6;
    string pronouns = 7;
    string description = 8;
    string reference_image = 9;
    repeated string colors = 10;
    bool is_main = 11;
    int64 created_at = 12;
}

message Badge {
    int64 id = 1;
    string name = 2;
    string icon = 3;
    string description = 4;
    int64 created_at = 5;
}

message Category {
    int64 id = 1;
    string name = 2;
    string description = 3;
    string icon = 4;
    int32 post_count = 5;
    int64 created_at = 6;
}

message Tag {
    int64 id = 1;
    string name = 2;
    string color = 3;
    int32 use_count = 4;
}

message Post {
    int64 id = 1;
    string title = 2;
    string content = 3;
    string author_id = 4;
    UserInfo author = 5;
    int64 category_id = 6;
    Category category = 7;
    repeated Tag tags = 8;
    int32 view_count = 9;
    int32 like_count = 10;
    int32 comment_count = 11;
    bool is_pinned = 12;
    bool is_locked = 13;
    int64 created_at = 14;
    int64 updated_at = 15;
    repeated string images = 16;
    ContentRating rating = 17;
    bool requires_verification = 18;
}

message Comment {
    int64 id = 1;
    int64 post_id = 2;
    string content = 3;
    string author_id = 4;
    UserInfo author = 5;
    int64 parent_id = 6;
    int32 like_count = 7;
    int64 created_at = 8;
    int64 updated_at = 9;
}

message GalleryItem {
    int64 id = 1;
    string title = 2;
    string description = 3;
    string image_url = 4;
    string author_id = 5;
    UserInfo author = 6;
    repeated Tag tags = 7;
    int32 like_count = 8;
    int32 view_count = 9;
    int64 created_at = 10;
    ContentRating rating = 11;
}

message CommissionType {
    int64 id = 1;
    string user_id = 2;
    UserInfo user = 3;
    string name = 4;
    string description = 5;
    double base_price = 6;
    string currency = 7;
    int32 delivery_days = 8;
    repeated string examples = 9;
    bool is_active = 10;
}

message CommissionOrder {
    int64 id = 1;
    int64 commission_type_id = 2;
    CommissionType commission_type = 3;
    string buyer_id = 4;
    UserInfo buyer = 5;
    string seller_id = 6;
    UserInfo seller = 7;
    string requirements = 8;
    string reference_url = 9;
    double price = 10;
    OrderStatus status = 11;
    repeated string progress_updates = 12;
    int64 created_at = 13;
    int64 updated_at = 14;
}

message Event {
    int64 id = 1;
    string title = 2;
    string description = 3;
    string location = 4;
    string organizer_id = 5;
    UserInfo organizer = 6;
    int64 start_time = 7;
    int64 end_time = 8;
    int32 max_attendees = 9;
    int32 attendee_count = 10;
    EventStatus status = 11;
    repeated string images = 12;
    int64 created_at = 13;
}

message Message {
    int64 id = 1;
    string sender_id = 2;
    UserInfo sender = 3;
    string receiver_id = 4;
    UserInfo receiver = 5;
    string content = 6;
    bool is_read = 7;
    int64 created_at = 8;
}

message CreateFursonaRequest {
    string name = 1;
    string species = 2;
    string gender = 3;
    string pronouns = 4;
    string description = 5;
    string reference_image = 6;
    repeated string colors = 7;
    bool is_main = 8;
    string access_token = 9;
}

message CreateFursonaResponse {
    int32 code = 1;
    string message = 2;
    int64 fursona_id = 3;
}

message GetUserFursonasRequest {
    string user_id = 1;
}

message GetUserFursonasResponse {
    int32 code = 1;
    string message = 2;
    repeated Fursona fursonas = 3;
}

message CreateCommissionTypeRequest {
    string name = 1;
    string description = 2;
    double base_price = 3;
    string currency = 4;
    int32 delivery_days = 5;
    repeated string examples = 6;
    string access_token = 7;
}

message CreateCommissionTypeResponse {
    int32 code = 1;
    string message = 2;
    int64 commission_type_id = 3;
}

message GetUserCommissionsRequest {
    string user_id = 1;
}

message GetUserCommissionsResponse {
    int32 code = 1;
    string message = 2;
    repeated CommissionType commissions = 3;
}

message CreateOrderRequest {
    int64 commission_type_id = 1;
    string requirements = 2;
    string reference_url = 3;
    string access_token = 4;
}

message CreateOrderResponse {
    int32 code = 1;
    string message = 2;
    int64 order_id = 3;
}

message GetMyOrdersRequest {
    string access_token = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message GetMyOrdersResponse {
    int32 code = 1;
    string message = 2;
    repeated CommissionOrder orders = 3;
    int32 total = 4;
}

message UpdateCommissionStatusRequest {
    CommissionStatus status = 1;
    string access_token = 2;
}

message UpdateCommissionStatusResponse {
    int32 code = 1;
    string message = 2;
}

message CreateEventRequest {
    string title = 1;
    string description = 2;
    string location = 3;
    int64 start_time = 4;
    int64 end_time = 5;
    int32 max_attendees = 6;
    repeated string images = 7;
    string access_token = 8;
}

message CreateEventResponse {
    int32 code = 1;
    string message = 2;
    int64 event_id = 3;
}

message ListEventsRequest {
    int32 page = 1;
    int32 page_size = 2;
    EventStatus status = 3;
}

message ListEventsResponse {
    int32 code = 1;
    string message = 2;
    repeated Event events = 3;
    int32 total = 4;
}

message JoinEventRequest {
    int64 event_id = 1;
    string access_token = 2;
}

message JoinEventResponse {
    int32 code = 1;
    string message = 2;
}

message SendMessageRequest {
    string receiver_id = 1;
    string content = 2;
    string access_token = 3;
}

message SendMessageResponse {
    int32 code = 1;
    string message = 2;
    int64 message_id = 3;
}

message GetMessagesRequest {
    string other_user_id = 1;
    int32 page = 2;
    int32 page_size = 3;
    string access_token = 4;
}

message GetMessagesResponse {
    int32 code = 1;
    string message = 2;
    repeated Message messages = 3;
    int32 total = 4;
}

message GetUserRequest {
    string user_id = 1;
}

message GetUserResponse {
    int32 code = 1;
    string message = 2;
    UserInfo user = 3;
}

message CreatePostRequest {
    string title = 1;
    string content = 2;
    int64 category_id = 3;
    repeated int64 tag_ids = 4;
    repeated string images = 5;
    string access_token = 6;
    ContentRating rating = 7;
}

message CreatePostResponse {
    int32 code = 1;
    string message = 2;
    int64 post_id = 3;
}

message GetPostRequest {
    int64 post_id = 1;
}

message GetPostResponse {
    int32 code = 1;
    string message = 2;
    Post post = 3;
}

message ListPostsRequest {
    int64 category_id = 1;
    int32 page = 2;
    int32 page_size = 3;
    string sort_by = 4;
    string keyword = 5;
    ContentRating max_rating = 6;
}

message ListPostsResponse {
    int32 code = 1;
    string message = 2;
    repeated Post posts = 3;
    int32 total = 4;
}

message CreateCommentRequest {
    int64 post_id = 1;
    string content = 2;
    int64 parent_id = 3;
    string access_token = 4;
}

message CreateCommentResponse {
    int32 code = 1;
    string message = 2;
    int64 comment_id = 3;
}

message ListCommentsRequest {
    int64 post_id = 1;
    int32 page = 2;
    int32 page_size = 3;
}

message ListCommentsResponse {
    int32 code = 1;
    string message = 2;
    repeated Comment comments = 3;
    int32 total = 4;
}

message LikePostRequest {
    int64 post_id = 1;
    string access_token = 2;
}

message LikePostResponse {
    int32 code = 1;
    string message = 2;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
    int32 code = 1;
    string message = 2;
    repeated Category categories = 3;
}

message UploadGalleryRequest {
    string title = 1;
    string description = 2;
    string image_url = 3;
    repeated int64 tag_ids = 4;
    string access_token = 5;
    ContentRating rating = 6;
}

message UploadGalleryResponse {
    int32 code = 1;
    string message = 2;
    int64 gallery_id = 3;
}

message ListGalleryRequest {
    int32 page = 1;
    int32 page_size = 2;
    int64 tag_id = 3;
    ContentRating max_rating = 4;
}

message ListGalleryResponse {
    int32 code = 1;
    string message = 2;
    repeated GalleryItem items = 3;
    int32 total = 4;
}

message FollowUserRequest {
    string target_user_id = 1;
    string access_token = 2;
}

message FollowUserResponse {
    int32 code = 1;
    string message = 2;
}

service FurBBSService {
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
    rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
    rpc GetPost(GetPostRequest) returns (GetPostResponse);
    rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
    rpc CreateComment(CreateCommentRequest) returns (CreateCommentResponse);
    rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse);
    rpc LikePost(LikePostRequest) returns (LikePostResponse);
    rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);
    rpc UploadGallery(UploadGalleryRequest) returns (UploadGalleryResponse);
    rpc ListGallery(ListGalleryRequest) returns (ListGalleryResponse);
    rpc FollowUser(FollowUserRequest) returns (FollowUserResponse);
    
    rpc CreateFursona(CreateFursonaRequest) returns (CreateFursonaResponse);
    rpc GetUserFursonas(GetUserFursonasRequest) returns (GetUserFursonasResponse);
    
    rpc CreateCommissionType(CreateCommissionTypeRequest) returns (CreateCommissionTypeResponse);
    rpc GetUserCommissions(GetUserCommissionsRequest) returns (GetUserCommissionsResponse);
    rpc UpdateCommissionStatus(UpdateCommissionStatusRequest) returns (UpdateCommissionStatusResponse);
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc GetMyOrders(GetMyOrdersRequest) returns (GetMyOrdersResponse);
    
    rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
    rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
    rpc JoinEvent(JoinEventRequest) returns (JoinEventResponse);
    
    rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
    rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);

    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
    rpc GetServerStats(GetServerStatsRequest) returns (GetServerStatsResponse);
    
    rpc GrantPermission(GrantPermissionRequest) returns (GrantPermissionResponse);
    rpc RevokePermission(RevokePermissionRequest) returns (RevokePermissionResponse);
    rpc ListUserPermissions(ListUserPermissionsRequest) returns (ListUserPermissionsResponse);
    
    rpc ModeratePost(ModeratePostRequest) returns (ModeratePostResponse);
    rpc PinPost(PinPostRequest) returns (PinPostResponse);
    rpc LockPost(LockPostRequest) returns (LockPostResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
    int32 code = 1;
    string message = 2;
    bool database_healthy = 3;
    bool casdoor_healthy = 4;
    int64 server_time = 5;
    string version = 6;
}

message GetServerStatsRequest {
    string access_token = 1;
}

message GetServerStatsResponse {
    int32 code = 1;
    string message = 2;
    int64 total_users = 3;
    int64 total_posts = 4;
    int64 total_comments = 5;
    int64 total_galleries = 6;
    int64 total_fursonas = 7;
    int64 total_commissions = 8;
    int64 total_events = 9;
    int64 active_connections = 10;
    int64 uptime_seconds = 11;
}

enum PermissionType {
    PERMISSION_CREATE_POST = 0;
    PERMISSION_EDIT_ANY_POST = 1;
    PERMISSION_DELETE_ANY_POST = 2;
    PERMISSION_PIN_POST = 3;
    PERMISSION_LOCK_POST = 4;
    PERMISSION_MANAGE_USERS = 5;
    PERMISSION_MODERATE_CONTENT = 6;
    PERMISSION_CREATE_COMMISSION = 7;
    PERMISSION_MANAGE_EVENTS = 8;
    PERMISSION_ADMIN_ACCESS = 9;
}

message GrantPermissionRequest {
    string access_token = 1;
    string target_user_id = 2;
    PermissionType permission = 3;
}

message GrantPermissionResponse {
    int32 code = 1;
    string message = 2;
}

message RevokePermissionRequest {
    string access_token = 1;
    string target_user_id = 2;
    PermissionType permission = 3;
}

message RevokePermissionResponse {
    int32 code = 1;
    string message = 2;
}

message ListUserPermissionsRequest {
    string access_token = 1;
    string target_user_id = 2;
}

message ListUserPermissionsResponse {
    int32 code = 1;
    string message = 2;
    repeated PermissionType permissions = 3;
}

message ModeratePostRequest {
    string access_token = 1;
    int64 post_id = 2;
    bool remove = 3;
    string reason = 4;
}

message ModeratePostResponse {
    int32 code = 1;
    string message = 2;
}

message PinPostRequest {
    string access_token = 1;
    int64 post_id = 2;
    bool is_pinned = 3;
}

message PinPostResponse {
    int32 code = 1;
    string message = 2;
}

message LockPostRequest {
    string access_token = 1;
    int64 post_id = 2;
    bool is_locked = 3;
}

message LockPostResponse {
    int32 code = 1;
    string message = 2;
}
