server:
  listen: 0.0.0.0:12345
  thread_num: 4
  idle_time: 60000

database:
  host: localhost
  port: 5432
  dbname: furbbs
  user: postgres
  password: postgres
  max_connections: 20

casdoor:
  endpoint: http://localhost:8000
  client_id: your_client_id
  client_secret: your_client_secret
  certificate: |
    -----BEGIN CERTIFICATE-----
    your_certificate_here
    -----END CERTIFICATE-----
  org_name: FurBBS
  app_name: FurBBS
  redirect_uri: http://localhost:3000/callback

log:
  level: info
  file: ./logs/furbbs.log
  max_size: 100
  max_files: 10

security:
  enable_rate_limit: true
  rate_limit_requests: 100
  rate_limit_window: 60
  enable_xss_protection: true
  enable_sql_protection: true
  jwt_expiry_hours: 24

cors:
  enabled: true
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - "*"
  expose_headers:
    - Content-Length
    - Content-Type
  allow_credentials: true
  max_age: 86400

banner:
  max_count: 5

open_platform:
  enable: true
  webhook_timeout: 10000

storage:
  path: ./uploads
  base_url: /uploads
  max_size_mb: 10

email:
  smtp:
    host: smtp.example.com
    port: 587
    user: noreply@furbbs.com
    password: yourpassword
  from: FurBBS <noreply@furbbs.com>

cache:
  default_ttl_seconds: 300

scheduler:
  enabled: true

netease_verify:
  enabled: true
  secret_id: your_secret_id
  secret_key: your_secret_key
  business_id: your_business_id
  mandatory_verification: false
  require_face_verify: false
  cache_verified: true
